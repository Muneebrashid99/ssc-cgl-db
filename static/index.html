<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBI Grade B 2026 — Command Centre</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a0f'/%3E%3Crect x='8' y='38' width='48' height='5' rx='2.5' fill='%23c9a84c'/%3E%3Crect x='14' y='28' width='4' height='10' rx='1' fill='%23c9a84c'/%3E%3Crect x='22' y='22' width='4' height='16' rx='1' fill='%23c9a84c'/%3E%3Crect x='30' y='18' width='4' height='20' rx='1' fill='%23e8c46b'/%3E%3Crect x='38' y='25' width='4' height='13' rx='1' fill='%23c9a84c'/%3E%3Crect x='46' y='30' width='4' height='8' rx='1' fill='%23c9a84c'/%3E%3Ctext x='32' y='56' font-family='sans-serif' font-size='7' font-weight='700' fill='%23c9a84c' text-anchor='middle'%3ERBI%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--bg2:#0d0d1a;--bg3:#12121f;--bg4:#181828;
  --surface:#0f0f1e;--surface2:#16162a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.18);
  --text1:#f0efe8;--text2:#9896a6;--text3:#4e4d60;--text4:#28273a;
  --gold:#c9a84c;--gold2:#e8c46b;--gold3:#f5d87e;
  --gold-dim:rgba(201,168,76,0.1);--gold-border:rgba(201,168,76,0.2);--gold-glow:rgba(201,168,76,0.15);
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.08);--teal-border:rgba(45,212,191,0.2);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.2);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.08);
  --green:#34d399;--green-dim:rgba(52,211,153,0.08);--green-border:rgba(52,211,153,0.2);
  --red:#f87171;--red-dim:rgba(248,113,113,0.08);--red-border:rgba(248,113,113,0.2);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,0.08);
  --shadow:0 8px 32px rgba(0,0,0,0.6);--shadow-lg:0 20px 60px rgba(0,0,0,0.8);--shadow-sm:0 2px 12px rgba(0,0,0,0.4);
  --glow-gold:0 0 0 2px rgba(201,168,76,0.25),0 0 20px rgba(201,168,76,0.1);
  --sidebar-w:228px;--topbar-h:52px;--radius:12px;--radius-sm:8px;--radius-xs:5px;
}
[data-theme="light"] {
  --bg:#f4f3ef;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e7e0;
  --surface:#ffffff;--surface2:#fafaf6;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.2);
  --text1:#1a1825;--text2:#5a5870;--text3:#9a98b0;--text4:#c8c6d8;
  --gold:#a87c2a;--gold2:#c49a40;--gold3:#d4aa50;
  --gold-dim:rgba(168,124,42,0.08);--gold-border:rgba(168,124,42,0.2);--gold-glow:rgba(168,124,42,0.12);
  --teal:#0d9488;--blue:#2563eb;--purple:#7c3aed;
  --green:#059669;--green-dim:rgba(5,150,105,0.07);--green-border:rgba(5,150,105,0.2);
  --red:#dc2626;--red-dim:rgba(220,38,38,0.07);--red-border:rgba(220,38,38,0.2);
  --orange:#d97706;
  --shadow:0 4px 16px rgba(0,0,0,0.1);--shadow-lg:0 12px 40px rgba(0,0,0,0.15);--shadow-sm:0 2px 8px rgba(0,0,0,0.08);
  --glow-gold:0 0 0 2px rgba(168,124,42,0.2);
  --teal-dim:rgba(13,148,136,0.07);--blue-dim:rgba(37,99,235,0.07);
  --purple-dim:rgba(124,58,237,0.07);--orange-dim:rgba(217,119,6,0.07);
  --teal-border:rgba(13,148,136,0.2);--blue-border:rgba(37,99,235,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text1);font-family:'Outfit',system-ui,sans-serif;font-size:13.5px;line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--text1)}
a{color:inherit;text-decoration:none}

/* ── LAYOUT ── */
.app-layout{display:flex;min-height:100vh}
.main-area{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column}
.page-content{flex:1;padding:24px 28px;overflow-y:auto}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.sb-brand{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px var(--gold-glow)}
.sb-brand-name{font-size:13.5px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.sb-brand-name em{font-style:normal;color:var(--gold)}
.sb-tagline{font-size:9.5px;color:var(--text3);margin-top:1px;letter-spacing:.3px}
.sb-countdown{margin:10px 10px 4px;padding:10px 12px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:var(--radius-sm);display:flex;align-items:center;gap:10px}
.sbc-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--gold);line-height:1}
.sbc-label{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.sbc-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sb-section{padding:8px 10px 2px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:12.5px;color:var(--text2);font-weight:500}
.sb-nav-item:hover{background:var(--border);color:var(--text1)}
.sb-nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:600}
.sb-nav-item.active .sb-icon{color:var(--gold)}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px}
.sb-footer{margin-top:auto;padding:10px;border-top:1px solid var(--border)}
.sb-user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface)}
.sb-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;flex:1}
.sb-user-status{font-size:10px;color:var(--text3)}
.sb-logout-btn{padding:4px 6px;border-radius:4px;font-size:11px;color:var(--text3);transition:.15s}
.sb-logout-btn:hover{color:var(--red);background:var(--red-dim)}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100}
.topbar-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text1);flex:1}
.topbar-title span{color:var(--gold)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text2);font-size:15px;transition:.15s;cursor:pointer}
.icon-btn:hover{background:var(--border);color:var(--text1)}
.topbar-date{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace}

/* ── LOGIN PAGE ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;box-shadow:var(--shadow-lg)}
.login-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px;box-shadow:0 8px 24px var(--gold-glow)}
.login-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text1);outline:none;transition:.18s}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.login-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700;padding:12px;border-radius:9px;font-size:14px;transition:all .2s;margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--gold-glow)}
.login-err{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);padding:9px 12px;border-radius:7px;font-size:12px;text-align:center}

/* ── CARDS / SURFACES ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--text1)}
.section-sub{font-size:11px;color:var(--text3)}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:.18s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;line-height:1;color:var(--text1)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px}

/* ── BADGE / PILL ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-border)}
.badge-orange{background:var(--orange-dim);color:var(--orange)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:.18s;cursor:pointer}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--gold-glow)}
.btn-outline{border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--border3);color:var(--text1);background:var(--border)}
.btn-ghost{color:var(--text2)}
.btn-ghost:hover{color:var(--text1);background:var(--border)}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:6px}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── TABLES ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.data-table td{padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text2)}
.data-table tr:hover td{background:var(--surface2)}
.data-table tr:last-child td{border-bottom:none}

/* ── FORM INPUTS ── */
.field{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text1);outline:none;transition:.18s;width:100%}
.field:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.field-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
select.field{cursor:pointer}

/* ── PROGRESS BAR ── */
.progress-bar{background:var(--bg4);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── SCORE RING (canvas-free SVG) ── */
.score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-val{position:absolute;text-align:center;line-height:1.2}
.score-ring-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--text1)}
.score-ring-pct{font-size:10px;color:var(--text3)}

/* ── QUIZ ENGINE ── */
.quiz-option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:.15s;margin-bottom:8px}
.quiz-option:hover{border-color:var(--border2);background:var(--surface2)}
.quiz-option.selected{border-color:var(--gold);background:var(--gold-dim)}
.quiz-option.correct{border-color:var(--green);background:var(--green-dim)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-dim)}
.opt-letter{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.quiz-option.selected .opt-letter{background:var(--gold);border-color:var(--gold);color:#000}
.quiz-option.correct .opt-letter{background:var(--green);border-color:var(--green);color:#000}
.quiz-option.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff}

/* ── CHAT ── */
.chat-bubble{padding:10px 14px;border-radius:12px;max-width:80%;font-size:13px;line-height:1.6}
.chat-bubble.user{background:var(--gold-dim);border:1px solid var(--gold-border);margin-left:auto;border-bottom-right-radius:3px}
.chat-bubble.ai{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
.chat-row{display:flex;gap:8px;margin-bottom:12px;animation:fadeUp .2s ease}
.chat-row.user-row{flex-direction:row-reverse}
.chat-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── MISC ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.flex-row{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.text-gold{color:var(--gold)}
.text-muted{color:var(--text3)}
.text-sm{font-size:11.5px}
.text-xs{font-size:10.5px}
.mono{font-family:'Space Mono',monospace}
.serif{font-family:'Fraunces',serif}
.mt-4{margin-top:16px}
.mt-3{margin-top:12px}
.mt-2{margin-top:8px}
.mb-4{margin-bottom:16px}
.gap-2{gap:8px}
.gap-3{gap:12px}
.loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px}
.dot-spin{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.tooltip-wrap{position:relative;cursor:default}

/* ── PHASE BADGE COLORS ── */
.phase-a{background:rgba(91,163,245,.12);color:#5ba3f5;border:1px solid rgba(91,163,245,.2)}
.phase-b{background:rgba(212,168,67,.12);color:#d4a843;border:1px solid rgba(212,168,67,.2)}
.phase-c{background:rgba(168,127,245,.12);color:#a87ff5;border:1px solid rgba(168,127,245,.2)}
.phase-d{background:rgba(247,149,62,.12);color:#f7953e;border:1px solid rgba(247,149,62,.2)}
.phase-e{background:rgba(48,217,136,.12);color:#30d988;border:1px solid rgba(48,217,136,.2)}

/* ── MOBILE HAMBURGER ── */
.ham-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:var(--text2)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
@media(max-width:768px){
  .main-area{margin-left:0}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .ham-btn{display:flex}
  .grid2,.grid3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .page-content{padding:16px}
}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:stretch;justify-content:flex-end}
.drawer{width:380px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;animation:slideIn .22s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-hd{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}

/* ── NOTE EDITOR ── */
.note-list{display:flex;flex-direction:column;gap:4px}
.note-item{padding:9px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent}
.note-item:hover{background:var(--surface2);border-color:var(--border)}
.note-item.active{background:var(--gold-dim);border-color:var(--gold-border)}
.note-title-input{background:transparent;border:none;outline:none;font-size:16px;font-weight:700;color:var(--text1);width:100%;font-family:'Fraunces',serif;padding:4px 0}
.note-editor{background:transparent;border:none;outline:none;font-size:13px;color:var(--text2);width:100%;resize:none;min-height:300px;line-height:1.8;padding:4px 0}

/* ── ANIMATIONS ── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:pageEnter .2s ease}
@keyframes pageEnter{from{opacity:0}to{opacity:1}}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:10px;padding:3px}
.tab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:.15s}
.tab.active{background:var(--bg2);color:var(--text1);box-shadow:var(--shadow-sm)}
.tab:hover:not(.active){color:var(--text1)}

/* ── TOPBAR STATUS ── */

function daysUntilExam() {
  const exam = new Date('2026-09-15');
  const today = new Date();
  return Math.max(0, Math.ceil((exam - today) / (1000 * 60 * 60 * 24)));
}
function getStatusText() {
  const h = new Date().getHours();
  if (h < 6) return '🌙 Late Night Warrior';
  if (h < 12) return '🌅 Morning Session';
  if (h < 17) return '☀️ Afternoon Grind';
  if (h < 21) return '🌆 Evening Study';
  return '🌙 Night Owl Mode';
}
function scoreColor(s) {
  if (s >= 80) return 'var(--green)';
  if (s >= 60) return 'var(--gold)';
  if (s >= 40) return 'var(--orange)';
  return 'var(--red)';
}
function diffBadge(d) {
  const map = { easy: 'badge-green', medium: 'badge-gold', hard: 'badge-red' };
  return map[d] || 'badge-blue';
}

// ═══════════════════ SMALL COMPONENTS ═══════════════════
function Spinner() {
  return <div className="loading"><div className="dot-spin"/><span>Loading...</span></div>;
}
function ScoreRing({ score, size = 100, stroke = 8 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (score / 100) * circ;
  const color = scoreColor(score);
  return (
    <div className="score-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg4)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round" style={{ transition: 'stroke-dasharray .6s' }}/>
      </svg>
      <div className="score-ring-val">
        <div className="score-ring-num">{score}<span style={{ fontSize: 14 }}>%</span></div>
      </div>
    </div>
  );
}
function ProgressBar({ val, max, color = 'var(--gold)' }) {
  const pct = max ? Math.min(100, (val / max) * 100) : 0;
  return (
    <div className="progress-bar">
      <div className="progress-fill" style={{ width: pct + '%', background: color }}/>
    </div>
  );
}

// ═══════════════════ LOGIN ═══════════════════
function Login({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const submit = async () => {
    setLoading(true); setErr('');
    try {
      const r = await fetch('/login', {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`
      });
      const d = await r.json();
      if (d.success) { onLogin(); }
      else { setErr(d.message || 'Invalid credentials'); }
    } catch { setErr('Server error. Is Flask running?'); }
    setLoading(false);
  };
  return (
    <div className="login-page">
      <div className="login-card fade-in">
        <div className="login-logo">🏦</div>
        <h1 className="login-title">RBI Grade B</h1>
        <p className="login-sub">Command Centre · 2026 Edition</p>
        {err && <div className="login-err">{err}</div>}
        <div className="login-form">
          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-input" value={user} onChange={e => setUser(e.target.value)}
              placeholder="Enter username" onKeyDown={e => e.key === 'Enter' && submit()}/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={pass} onChange={e => setPass(e.target.value)}
              placeholder="Enter password" onKeyDown={e => e.key === 'Enter' && submit()}/>
          </div>
          <button className="login-btn" onClick={submit} disabled={loading}>
            {loading ? 'Signing in...' : 'Sign In →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ SYLLABUS ═══════════════════
function Syllabus({ DB }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [drawer, setDrawer] = useState(null);

  const allTopics = DB.subjects.flatMap(s => s.topics.map(t => ({ ...t, subjectColor: s.color, subjectPhase: s.phase })));
  const filtered = allTopics.filter(t => {
    if (filter === 'hp' && !t.high_priority) return false;
    if (filter === 'phase1' && t.subjectPhase !== 'Phase 1') return false;
    if (filter === 'phase2' && t.subjectPhase !== 'Phase 2') return false;
    if (search && !t.topic.toLowerCase().includes(search.toLowerCase()) && !t.subject.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="fade-in">
      <div className="card mb-4" style={{ marginBottom: 16 }}>
        <div className="flex-between" style={{ gap: 12, flexWrap: 'wrap' }}>
          <div className="tabs">
            {[['all', 'All Topics'], ['hp', '🔥 High Priority'], ['phase1', 'Phase 1'], ['phase2', 'Phase 2']].map(([v, l]) => (
              <button key={v} className={`tab ${filter === v ? 'active' : ''}`} onClick={() => setFilter(v)}>{l}</button>
            ))}
          </div>
          <input className="field" placeholder="🔍 Search topics..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ width: 200 }}/>
        </div>
      </div>

      <div className="card" style={{ overflowX: 'auto' }}>
        <table className="data-table">
          <thead>
            <tr>
              <th>#</th><th>Subject</th><th>Topic</th><th>Difficulty</th>
              <th>Hours</th><th>PYQ Freq</th><th>Flags</th><th>Resource</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((t, i) => (
              <tr key={t.topic_id} style={{ cursor: 'pointer' }} onClick={() => setDrawer(t)}>
                <td className="mono text-muted">{i + 1}</td>
                <td>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ width: 3, height: 28, background: t.subjectColor, borderRadius: 2, flexShrink: 0 }}/>
                    <span style={{ fontSize: 11.5, color: 'var(--text3)' }}>{t.subject.split('(')[0].trim().split(' ').slice(0, 2).join(' ')}</span>
                  </div>
                </td>
                <td style={{ fontWeight: 500, color: 'var(--text1)' }}>{t.topic}</td>
                <td><span className={`badge ${diffBadge(t.difficulty_level)}`}>{t.difficulty_level}</span></td>
                <td className="mono">{t.estimated_hours}h</td>
                <td>
                  <div style={{ display: 'flex', gap: 2 }}>
                    {[1,2,3,4,5].map(n => (
                      <span key={n} style={{ width: 6, height: 6, borderRadius: 1, background: n <= t.pyq_frequency ? 'var(--gold)' : 'var(--bg4)' }}/>
                    ))}
                  </div>
                </td>
                <td>
                  <div style={{ display: 'flex', gap: 4 }}>
                    {t.high_priority && <span className="badge badge-red" style={{ fontSize: 9 }}>HP</span>}
                    {t.mock_test_stage && <span className="badge badge-purple" style={{ fontSize: 9 }}>MOCK</span>}
                    {t.revision_required && <span className="badge badge-orange" style={{ fontSize: 9 }}>REV</span>}
                  </div>
                </td>
                <td>
                  <a href={t.best_youtube_video_link} target="_blank" rel="noopener"
                    onClick={e => e.stopPropagation()}
                    style={{ color: 'var(--red)', fontSize: 11 }}>▶ {t.best_youtube_channel}</a>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && <div className="empty-state"><div className="empty-icon">🔍</div><div>No topics match your filter</div></div>}
      </div>

      {drawer && (
        <div className="drawer-overlay" onClick={() => setDrawer(null)}>

                <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>{drawer.subject}</div>
                <div style={{ fontFamily: 'Fraunces, serif', fontSize: 18, fontWeight: 700 }}>{drawer.topic}</div>
              </div>
              <button className="icon-btn" onClick={() => setDrawer(null)}>✕</button>
            </div>
            <div style={{ padding: '18px 20px', display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <span className={`badge ${diffBadge(drawer.difficulty_level)}`}>{drawer.difficulty_level}</span>
                <span className={`badge ${drawer.subjectPhase === 'Phase 1' ? 'badge-blue' : 'badge-purple'}`}>{drawer.subjectPhase}</span>
                {drawer.high_priority && <span className="badge badge-red">High Priority</span>}
                {drawer.mock_test_stage && <span className="badge badge-purple">Mock Ready</span>}
              </div>
              <div>
                <div className="field-label">Subtopics</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {drawer.subtopic.map(s => (
                    <span key={s} style={{ padding: '3px 9px', background: 'var(--surface2)', borderRadius: 20, fontSize: 11, color: 'var(--text2)', border: '1px solid var(--border)' }}>{s}</span>

              <div className="grid2">
                <div className="card-sm"><div className="text-xs text-muted">Estimated Hours</div><div className="mono" style={{ fontSize: 20, color: 'var(--gold)', marginTop: 4 }}>{drawer.estimated_hours}h</div></div>
                <div className="card-sm"><div className="text-xs text-muted">PYQ Frequency</div><div className="mono" style={{ fontSize: 20, color: 'var(--teal)', marginTop: 4 }}>{drawer.pyq_frequency}/5</div></div>
              </div>
              <div>
                <div className="field-label">Best Resources</div>
                <div style={{ fontSize: 12.5, color: 'var(--text2)', marginBottom: 8 }}>📺 Channel: {drawer.best_youtube_channel}</div>
                <div style={{ fontSize: 12.5, color: 'var(--text2)', marginBottom: 12 }}>📖 Practice: {drawer.best_practice_source}</div>
                <a href={drawer.best_youtube_video_link} target="_blank" rel="noopener" className="btn btn-outline btn-sm">▶ Watch on YouTube</a>
              </div>
              <div className="field-label" style={{ marginBottom: 0 }}>Tags</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                {drawer.tags.map(tag => (
                  <span key={tag} style={{ padding: '2px 8px', background: 'var(--bg4)', borderRadius: 20, fontSize: 10, color: 'var(--text3)' }}>#{tag}</span>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════ PYQ GENERATOR ═══════════════════
function PYQGenerator({ DB }) {
  const [subject, setSubject] = useState('');
  const [topic, setTopic] = useState('');
  const [year, setYear] = useState('2024');
  const [count, setCount] = useState(5);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState('');

  const selSubj = DB.subjects.find(s => s.subject_id === parseInt(subject));
  const topics = selSubj ? selSubj.topics : [];

  const generate = async () => {
    setLoading(true); setResult('');
    try {
      const d = await api.post('/api/ai/generate', {
        subject: selSubj?.subject || subject,
        topic, year, count,
        prompt: `Generate ${count} PYQ-style MCQ questions for RBI Grade B ${year} on topic: ${topic || selSubj?.subject}. Format each as Q: [question]\nA) [opt] B) [opt] C) [opt] D) [opt]\nAnswer: [letter]\nExplanation: [brief]`
      });
      setResult(d.questions || d.content || d.text || JSON.stringify(d));
    } catch { setResult('Error connecting to AI service.'); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <div className="grid2" style={{ marginBottom: 16 }}>
        <div className="card">
          <div className="section-title" style={{ marginBottom: 14 }}>Generate PYQ Questions</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div>
              <label className="field-label">Subject</label>
              <select className="field" value={subject} onChange={e => { setSubject(e.target.value); setTopic(''); }}>
                <option value="">All Subjects</option>
                {DB.subjects.map(s => <option key={s.subject_id} value={s.subject_id}>{s.icon} {s.subject}</option>)}
              </select>
            </div>
            {selSubj && (
              <div>
                <label className="field-label">Topic</label>
                <select className="field" value={topic} onChange={e => setTopic(e.target.value)}>
                  <option value="">All Topics</option>
                  {topics.map(t => <option key={t.topic_id} value={t.topic}>{t.topic}</option>)}
                </select>
              </div>
            )}
            <div className="grid2">
              <div>
                <label className="field-label">Year</label>
                <select className="field" value={year} onChange={e => setYear(e.target.value)}>
                  {['2024','2023','2022','2021','2020','2019'].map(y => <option key={y}>{y}</option>)}
                </select>
              </div>
              <div>
                <label className="field-label">Count</label>
                <select className="field" value={count} onChange={e => setCount(parseInt(e.target.value))}>
                  {[3,5,10,15,20].map(n => <option key={n}>{n}</option>)}
                </select>
              </div>
            </div>
            <button className="btn btn-gold" onClick={generate} disabled={loading}>
              {loading ? <><div className="dot-spin"/>Generating...</> : '🎯 Generate PYQs'}
            </button>
          </div>

// ═══════════════════ AI PRACTICE ═══════════════════
function AIPractice({ DB }) {
  const [topic, setTopic] = useState('');
  const [questions, setQuestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});

  const quickTopics = DB.subjects.flatMap(s => s.topics.filter(t => t.high_priority).slice(0, 2))
    .slice(0, 12).map(t => t.topic);

  const generate = async (t = topic) => {
    if (!t) return;
    setLoading(true); setQuestions([]); setAnswers({}); setRevealed({});
    try {
      const d = await api.post('/api/ai/generate', {
        topic: t, count: 5,
        prompt: `Generate 5 MCQ practice questions for RBI Grade B on: "${t}". Format EXACTLY as JSON array: [{"q":"question","options":["A) opt","B) opt","C) opt","D) opt"],"answer":"A","explanation":"brief explanation"}]`
      });
      const text = d.questions || d.content || d.text || '';
      const match = text.match(/\[[\s\S]*\]/);
      if (match) {
        try { setQuestions(JSON.parse(match[0])); }
        catch { setQuestions([{ q: text, options: [], answer: '', explanation: '' }]); }
      } else {
        setQuestions([{ q: text, options: [], answer: '', explanation: '' }]);
      }
    } catch { setQuestions([{ q: 'Failed to generate. Check AI service.', options: [], answer: '', explanation: '' }]); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      <div className="card mb-4" style={{ marginBottom: 16 }}>
        <div className="section-title" style={{ marginBottom: 12 }}>AI Practice Generator</div>
        <div style={{ display: 'flex', gap: 10 }}>
          <input className="field" placeholder="Enter topic (e.g. Monetary Policy, Seating Arrangement...)"
            value={topic} onChange={e => setTopic(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && generate()} style={{ flex: 1 }}/>
          <button className="btn btn-gold" onClick={() => generate()} disabled={loading || !topic}>
            {loading ? <><div className="dot-spin"/>...</> : '⚡ Generate'}
          </button>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 10 }}>
          {quickTopics.map(t => (
            <button key={t} className="btn btn-outline btn-sm" onClick={() => { setTopic(t); generate(t); }}>
              {t.split(' ').slice(0, 3).join(' ')}
            </button>
          ))}
        </div>
      </div>

      {loading && <Spinner/>}
      {questions.map((q, i) => (
        <div key={i} className="card mb-4" style={{ marginBottom: 14 }}>
          <div style={{ fontWeight: 600, marginBottom: 12, lineHeight: 1.6 }}>
            <span className="badge badge-blue" style={{ marginRight: 8 }}>Q{i + 1}</span>{q.q}
          </div>
          {q.options && q.options.length > 0 && q.options.map((opt, j) => {
            const letter = ['A','B','C','D'][j];
            const isSelected = answers[i] === letter;
            const isCorrect = revealed[i] && letter === q.answer;
            const isWrong = revealed[i] && isSelected && letter !== q.answer;
            return (
              <div key={j} className={`quiz-option ${isSelected && !revealed[i] ? 'selected' : ''} ${isCorrect ? 'correct' : ''} ${isWrong ? 'wrong' : ''}`}
                onClick={() => !revealed[i] && setAnswers(a => ({ ...a, [i]: letter }))}>
                <div className="opt-letter">{letter}</div>
                <span style={{ fontSize: 13 }}>{opt.replace(/^[A-D]\)\s*/, '')}</span>
              </div>
            );
          })}
          <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
            {answers[i] && !revealed[i] && (
              <button className="btn btn-gold btn-sm" onClick={() => setRevealed(r => ({ ...r, [i]: true }))}>
                Check Answer
              </button>
            )}
            {revealed[i] && q.explanation && (
              <div style={{ padding: '10px 12px', background: 'var(--teal-dim)', border: '1px solid var(--teal-border)', borderRadius: 8, fontSize: 12.5, color: 'var(--text2)', flex: 1 }}>
                <span style={{ color: 'var(--teal)', fontWeight: 600 }}>Explanation: </span>{q.explanation}
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════ MOCK TESTS ═══════════════════
function MockTests({ DB }) {
  const [state, setState] = useState('select'); // select | quiz | result
  const [selSubject, setSelSubject] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [timer, setTimer] = useState(0);
  const timerRef = useRef(null);

  useEffect(() => {
    if (state === 'quiz') {
      timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [state]);

  const startQuiz = async (subj) => {
    setLoading(true); setSelSubject(subj);
    try {
      const d = await api.get(`/api/quiz/${subj.subject_id}`);
      if (d.questions && d.questions.length > 0) {
        setQuestions(d.questions); setAnswers({}); setCurrent(0); setTimer(0);
        setState('quiz');
      } else { alert('No questions found for this subject. Add some first!'); }
    } catch { alert('Error loading quiz.'); }
    setLoading(false);
  };

  const submitQuiz = async () => {
    clearInterval(timerRef.current);
    const ans = questions.map((q, i) => ({ question_id: q.id, selected_option: answers[i] || null }));
    try {
      const d = await api.post('/api/quiz/submit', {
        subject_id: selSubject.subject_id, answers: ans, time_taken: timer
      });
      setResult(d);
    } catch { setResult({ score: 0, total: questions.length, correct: 0 }); }
    setState('result');
  };

  if (loading) return <Spinner/>;

  if (state === 'select') return (
    <div className="fade-in">
      <div className="section-hd" style={{ marginBottom: 16 }}>
        <span className="section-title">Choose a Subject</span>
        <span className="text-muted text-sm">Select to start quiz from your question bank</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 14 }}>
        {DB.subjects.map(s => (
          <div key={s.subject_id} className="card" style={{ cursor: 'pointer', borderTop: `3px solid ${s.color}`, transition: '.18s' }}
            onClick={() => startQuiz(s)}
            onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
            onMouseLeave={e => e.currentTarget.style.transform = ''}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>{s.icon}</div>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{s.subject.split('(')[0].trim()}</div>
            <div className="flex-between">
              <span className={`badge ${s.phase === 'Phase 1' ? 'badge-blue' : 'badge-purple'}`}>{s.phase}</span>
              {s.total_marks && <span className="text-muted text-xs mono">{s.total_marks}M</span>}
            </div>
            <div className="text-xs text-muted" style={{ marginTop: 8, lineHeight: 1.5 }}>{s.exam_strategy}</div>
          </div>
        ))}
      </div>
    </div>
  );

  if (state === 'quiz') {
    const q = questions[current];
    const mins = Math.floor(timer / 60), secs = timer % 60;
    const progress = ((current + 1) / questions.length) * 100;
    return (
      <div className="fade-in">
        <div className="card" style={{ marginBottom: 14 }}>
          <div className="flex-between" style={{ marginBottom: 10 }}>
            <div>
              <div style={{ fontWeight: 700 }}>{selSubject.icon} {selSubject.subject.split('(')[0].trim()}</div>
              <div className="text-xs text-muted">Question {current + 1} of {questions.length}</div>
            </div>
            <div className="mono" style={{ fontSize: 18, color: timer > 3600 ? 'var(--red)' : 'var(--gold)' }}>
              ⏱ {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
            </div>
          </div>
          <ProgressBar val={current + 1} max={questions.length} color={selSubject.color}/>
          <div style={{ display: 'flex', gap: 4, marginTop: 10, flexWrap: 'wrap' }}>
            {questions.map((_, i) => (
              <div key={i} style={{ width: 22, height: 22, borderRadius: 4, border: '1px solid var(--border)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700,
                background: i === current ? selSubject.color : answers[i] !== undefined ? 'var(--green-dim)' : 'transparent',
                color: i === current ? '#000' : answers[i] !== undefined ? 'var(--green)' : 'var(--text3)' }}
                onClick={() => setCurrent(i)}>{i + 1}</div>
            ))}
          </div>
        </div>
        <div className="card">
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 16, lineHeight: 1.7 }}>{q.question_text}</div>
          {[q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean).map((opt, j) => {
            const letter = ['A','B','C','D'][j];
            return (
              <div key={j} className={`quiz-option ${answers[current] === letter ? 'selected' : ''}`}
                onClick={() => setAnswers(a => ({ ...a, [current]: letter }))}>
                <div className="opt-letter">{letter}</div>
                <span>{opt}</span>
              </div>
            );
          })}
          <div className="flex-between" style={{ marginTop: 16 }}>
            <button className="btn btn-outline btn-sm" onClick={() => setCurrent(c => Math.max(0, c - 1))} disabled={current === 0}>← Prev</button>
            {current < questions.length - 1 ? (
              <button className="btn btn-gold btn-sm" onClick={() => setCurrent(c => c + 1)}>Next →</button>
            ) : (
              <button className="btn btn-gold" onClick={submitQuiz}>Submit Quiz ✓</button>
            )}
          </div>
        </div>
      </div>
    );
  }

  if (state === 'result' && result) {
    const score = result.score_percent || result.score || 0;
    return (
      <div className="fade-in" style={{ maxWidth: 500, margin: '0 auto' }}>
        <div className="card" style={{ textAlign: 'center', padding: 32, borderColor: score >= 70 ? 'var(--green-border)' : score >= 40 ? 'var(--gold-border)' : 'var(--red-border)' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>{score >= 80 ? '🏆' : score >= 60 ? '✅' : score >= 40 ? '📈' : '💪'}</div>
          <ScoreRing score={Math.round(score)} size={120}/>
          <div className="serif" style={{ fontSize: 22, fontWeight: 700, marginTop: 14 }}>Quiz Complete!</div>
          <div className="text-muted" style={{ marginTop: 6, fontSize: 13 }}>
            {result.correct || 0} correct · {result.incorrect || 0} wrong · {result.skipped || 0} skipped
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 20 }}>
            <button className="btn btn-gold" onClick={() => { setState('select'); setQuestions([]); }}>New Quiz</button>
            <button className="btn btn-outline" onClick={() => setState('select')}>Change Subject</button>
          </div>
        </div>
      </div>
    );
  }
}

// ═══════════════════ NOTES ═══════════════════
function Notes() {
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem('rbi_notes') || '[]'); } catch { return []; }
  });
  const [active, setActive] = useState(0);
  const [title, setTitle] = useState('');
  const [content, setContent] = useState('');

  useEffect(() => {
    if (notes[active]) { setTitle(notes[active].title); setContent(notes[active].content); }
    else { setTitle(''); setContent(''); }
  }, [active, notes.length]);

  const save = () => {
    const updated = [...notes];
    if (active < updated.length) { updated[active] = { ...updated[active], title, content, updated: new Date().toISOString() }; }
    else { updated.push({ id: Date.now(), title: title || 'Untitled', content, created: new Date().toISOString() }); }
    setNotes(updated);
    localStorage.setItem('rbi_notes', JSON.stringify(updated));
  };
  const newNote = () => {
    const n = { id: Date.now(), title: 'New Note', content: '', created: new Date().toISOString() };
    const updated = [...notes, n]; setNotes(updated);
    localStorage.setItem('rbi_notes', JSON.stringify(updated));
    setActive(updated.length - 1);
  };
  const del = (i) => {
    const updated = notes.filter((_, j) => j !== i); setNotes(updated);
    localStorage.setItem('rbi_notes', JSON.stringify(updated));
    setActive(Math.max(0, i - 1));
  };

  return (
    <div className="fade-in" style={{ display: 'flex', gap: 16, height: 'calc(100vh - 140px)' }}>
      <div style={{ width: 220, flexShrink: 0 }}>
        <div className="card" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          <div className="flex-between" style={{ marginBottom: 12 }}>
            <span className="section-title" style={{ fontSize: 13 }}>My Notes</span>
            <button className="btn btn-gold btn-sm" onClick={newNote}>+ New</button>
          </div>
          <div className="note-list" style={{ flex: 1, overflowY: 'auto' }}>
            {notes.length === 0 && <div className="text-muted text-sm" style={{ textAlign: 'center', padding: '20px 0' }}>No notes yet</div>}
            {notes.map((n, i) => (
              <div key={n.id} className={`note-item ${i === active ? 'active' : ''}`} onClick={() => setActive(i)}>
                <div style={{ fontWeight: 600, fontSize: 12.5, marginBottom: 2 }}>{n.title || 'Untitled'}</div>
                <div className="text-xs text-muted">{n.content.slice(0, 40)}{n.content.length > 40 ? '...' : ''}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '16px 20px' }}>
        {notes.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📓</div>
            <div>Create your first note!</div>
            <button className="btn btn-gold btn-sm mt-2" onClick={newNote}>+ New Note</button>
          </div>
        ) : (
          <>
            <div className="flex-between" style={{ marginBottom: 12 }}>
              <input className="note-title-input" value={title} onChange={e => setTitle(e.target.value)} placeholder="Note title..."/>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-gold btn-sm" onClick={save}>Save</button>
                <button className="btn btn-danger btn-sm" onClick={() => del(active)}>Delete</button>
              </div>
            </div>
            <hr style={{ border: 'none', borderTop: '1px solid var(--border)', marginBottom: 12 }}/>
            <textarea className="note-editor" value={content} onChange={e => setContent(e.target.value)}
              placeholder="Start writing your notes here... Use this for formulas, key concepts, essay outlines, FM theories..."/>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════ IMPORT DATA ═══════════════════
function ImportData() {
  const [csvFile, setCsvFile] = useState(null);
  const [jsonText, setJsonText] = useState('');
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState('');
  const [stats, setStats] = useState(null);

  useEffect(() => {
    api.get('/api/questions').then(d => {
      if (d && d.length !== undefined) setStats({ total: d.length });
    }).catch(() => {});
  }, []);

  const importCSV = async () => {
    if (!csvFile) return;
    setLoading(true); setMsg('');
    const fd = new FormData(); fd.append('file', csvFile);
    try {
      const d = await api.postForm('/api/questions/import', fd);
      setMsg(d.message || `Imported successfully!`);
    } catch { setMsg('Import failed. Check CSV format.'); }
    setLoading(false);
  };

  const importJSON = async () => {
    setLoading(true); setMsg('');
    try {
      const questions = JSON.parse(jsonText);
      const d = await api.post('/api/questions', Array.isArray(questions) ? { questions } : questions);
      setMsg(d.message || 'Imported!');
    } catch { setMsg('Invalid JSON or import error.'); }
    setLoading(false);
  };

  return (
    <div className="fade-in">
      {stats && (
        <div className="stats-grid" style={{ marginBottom: 16 }}>
          <div className="stat-card"><div className="stat-icon">📚</div><div className="stat-val mono">{stats.total}</div><div className="stat-lbl">Questions in DB</div></div>
        </div>
      )}
      {msg && (
        <div style={{ padding: '10px 14px', background: msg.includes('fail') || msg.includes('error') ? 'var(--red-dim)' : 'var(--green-dim)', border: `1px solid ${msg.includes('fail') || msg.includes('error') ? 'var(--red-border)' : 'var(--green-border)'}`, borderRadius: 8, fontSize: 13, marginBottom: 16, color: msg.includes('fail') || msg.includes('error') ? 'var(--red)' : 'var(--green)' }}>
          {msg}
        </div>
      )}
      <div className="grid2">
        <div className="card">
          <div className="section-title" style={{ marginBottom: 14 }}>📁 CSV Import</div>
          <div style={{ border: '2px dashed var(--border2)', borderRadius: 10, padding: '28px 16px', textAlign: 'center', marginBottom: 14, cursor: 'pointer' }}
            onClick={() => document.getElementById('csvInput').click()}
            onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--gold)'; }}
            onDragLeave={e => e.currentTarget.style.borderColor = 'var(--border2)'}
            onDrop={e => { e.preventDefault(); setCsvFile(e.dataTransfer.files[0]); e.currentTarget.style.borderColor = 'var(--border2)'; }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>📤</div>
            <div style={{ fontSize: 13, color: 'var(--text2)' }}>{csvFile ? csvFile.name : 'Click or drag CSV file here'}</div>
            <div className="text-xs text-muted" style={{ marginTop: 4 }}>Format: question,option_a,option_b,option_c,option_d,correct_answer,explanation,subject_id</div>
          </div>
          <input id="csvInput" type="file" accept=".csv" style={{ display: 'none' }} onChange={e => setCsvFile(e.target.files[0])}/>
          <button className="btn btn-gold" onClick={importCSV} disabled={!csvFile || loading} style={{ width: '100%' }}>
            {loading ? 'Importing...' : '📤 Import CSV'}
          </button>
        </div>

        <div className="card">
          <div className="section-title" style={{ marginBottom: 14 }}>🔧 JSON Import</div>
          <textarea className="field" rows={8} placeholder='[{"question_text":"...","option_a":"...","option_b":"...","option_c":"...","option_d":"...","correct_answer":"A","explanation":"...","subject_id":1}]'
            value={jsonText} onChange={e => setJsonText(e.target.value)} style={{ marginBottom: 12, resize: 'vertical' }}/>
          <button className="btn btn-gold" onClick={importJSON} disabled={!jsonText || loading} style={{ width: '100%' }}>
            {loading ? 'Importing...' : '🔧 Import JSON'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ ADD QUESTION ═══════════════════
function AddQuestion({ DB }) {
  const [form, setForm] = useState({ subject_id: '', question_text: '', option_a: '', option_b: '', option_c: '', option_d: '', correct_answer: 'A', explanation: '' });
  const [loading, setLoading] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [msg, setMsg] = useState('');
  const [aiTopic, setAiTopic] = useState('');
  const [aiCount, setAiCount] = useState(5);

  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const submit = async () => {
    if (!form.question_text || !form.subject_id) { setMsg('Question text and subject are required.'); return; }
    setLoading(true); setMsg('');
    try {
      const d = await api.post('/api/questions', form);
      setMsg(d.message || 'Question added!');
      setForm(p => ({ ...p, question_text: '', option_a: '', option_b: '', option_c: '', option_d: '', explanation: '' }));
    } catch { setMsg('Error adding question.'); }
    setLoading(false);
  };

  const aiGenerate = async () => {
    setAiLoading(true); setMsg('');
    try {
      const d = await api.post('/api/ai/generate', {
        topic: aiTopic, count: aiCount,
        prompt: `Generate ${aiCount} RBI Grade B MCQ questions on "${aiTopic}". Return ONLY JSON array: [{"question_text":"...","option_a":"...","option_b":"...","option_c":"...","option_d":"...","correct_answer":"A","explanation":"..."}]`
      });
      const text = d.questions || d.content || d.text || '';
      const match = text.match(/\[[\s\S]*\]/);
      if (match) {
        const qs = JSON.parse(match[0]);
        // Save all
        await Promise.all(qs.map(q => api.post('/api/questions', { ...q, subject_id: form.subject_id || 1 })));
        setMsg(`✅ Generated and saved ${qs.length} questions!`);
      }
    } catch { setMsg('AI generation failed.'); }
    setAiLoading(false);
  };

  return (
    <div className="fade-in grid2">
      <div className="card">
        <div className="section-title" style={{ marginBottom: 16 }}>Manual Question Entry</div>
        {msg && <div style={{ padding: '9px 12px', background: msg.includes('Error') ? 'var(--red-dim)' : 'var(--green-dim)', borderRadius: 8, fontSize: 12.5, marginBottom: 12, color: msg.includes('Error') ? 'var(--red)' : 'var(--green)' }}>{msg}</div>}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div>
            <label className="field-label">Subject *</label>
            <select className="field" value={form.subject_id} onChange={e => f('subject_id', e.target.value)}>
              <option value="">Select Subject</option>
              {DB.subjects.map(s => <option key={s.subject_id} value={s.subject_id}>{s.icon} {s.subject}</option>)}
            </select>
          </div>
          <div>
            <label className="field-label">Question *</label>
            <textarea className="field" rows={4} value={form.question_text} onChange={e => f('question_text', e.target.value)} placeholder="Enter question text..."/>
          </div>
          {['option_a','option_b','option_c','option_d'].map((k, i) => (
            <div key={k}>
              <label className="field-label">Option {['A','B','C','D'][i]}</label>
              <input className="field" value={form[k]} onChange={e => f(k, e.target.value)} placeholder={`Option ${['A','B','C','D'][i]}`}/>
            </div>
          ))}
          <div>
            <label className="field-label">Correct Answer</label>
            <select className="field" value={form.correct_answer} onChange={e => f('correct_answer', e.target.value)}>
              {['A','B','C','D'].map(l => <option key={l}>{l}</option>)}
            </select>
          </div>
          <div>
            <label className="field-label">Explanation</label>
            <textarea className="field" rows={2} value={form.explanation} onChange={e => f('explanation', e.target.value)} placeholder="Brief explanation..."/>
          </div>
          <button className="btn btn-gold" onClick={submit} disabled={loading}>
            {loading ? 'Saving...' : '+ Add Question'}
          </button>
        </div>
      </div>

      <div className="card">
        <div className="section-title" style={{ marginBottom: 16 }}>🤖 AI Batch Generate</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <div>
            <label className="field-label">Subject (for saving)</label>
            <select className="field" value={form.subject_id} onChange={e => f('subject_id', e.target.value)}>
              <option value="">Select Subject</option>
              {DB.subjects.map(s => <option key={s.subject_id} value={s.subject_id}>{s.icon} {s.subject}</option>)}
            </select>
          </div>
          <div>
            <label className="field-label">Topic</label>
            <input className="field" value={aiTopic} onChange={e => setAiTopic(e.target.value)} placeholder="e.g. Monetary Policy Tools"/>
          </div>
          <div>
            <label className="field-label">Number of Questions</label>
            <select className="field" value={aiCount} onChange={e => setAiCount(parseInt(e.target.value))}>
              {[5,10,15,20].map(n => <option key={n}>{n}</option>)}
            </select>
          </div>
          <button className="btn btn-gold" onClick={aiGenerate} disabled={!aiTopic || aiLoading}>
            {aiLoading ? <><div className="dot-spin"/>Generating & Saving...</> : '🤖 Generate & Save to DB'}
          </button>
          <div style={{ padding: '12px', background: 'var(--surface2)', borderRadius: 8, fontSize: 12, color: 'var(--text2)', lineHeight: 1.6 }}>
            💡 AI will generate questions and automatically save them to the database. Make sure to select the correct subject first.
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ MAIN APP ═══════════════════
function App() {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [theme, setTheme] = useState('dark');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [checking, setChecking] = useState(true);
  const DB = SYLLABUS_DB;

  useEffect(() => {
    api.get('/health').then(d => { if (d.authenticated) setAuthed(true); })
      .catch(() => {})
      .finally(() => setChecking(false));
    document.documentElement.setAttribute('data-theme', theme);
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const logout = async () => {
    await fetch('/logout').catch(() => {});
    setAuthed(false);
  };

  if (checking) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div className="loading"><div className="dot-spin"/><span>Loading...</span></div>
    </div>
  );

  if (!authed) return <Login onLogin={() => setAuthed(true)}/>;

  const pageMap = {
    dashboard: <Dashboard DB={DB} setPage={setPage}/>,
    syllabus: <Syllabus DB={DB}/>,
    planner: <Planner DB={DB}/>,
    'exam-pattern': <ExamPattern/>,
    pyq: <PYQGenerator DB={DB}/>,
    practice: <AIPractice DB={DB}/>,
    'mock-tests': <MockTests DB={DB}/>,
    analytics: <Analytics/>,
    history: <History/>,
    'ai-tutor': <AITutor/>,
    notes: <Notes/>,
    import: <ImportData/>,
    'add-question': <AddQuestion DB={DB}/>,
  };

  return (
    <div className="app-layout">
      <Sidebar page={page} setPage={setPage} onLogout={logout} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)}/>
      <div className="main-area">
        <Topbar page={page} theme={theme} toggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} onHam={() => setSidebarOpen(true)}/>
        <div className="page-content">
          {pageMap[page] || <div className="empty-state"><div className="empty-icon">🚧</div><div>Page not found</div></div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
